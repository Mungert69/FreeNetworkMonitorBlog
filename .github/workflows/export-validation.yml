name: Export Validation

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  export-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare run config
        run: cp ./public/runConfig-dev.json ./public/runConfig.json

      - name: Build static export
        run: npm run export

      - name: Validate export artifacts
        run: npm run validate-export
