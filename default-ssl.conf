<IfModule mod_ssl.c>
    <VirtualHost _default_:443>
        ServerAdmin webmaster@localhost
        ServerName blog.readyforquantum.com  
                ErrorLog ${APACHE_LOG_DIR}/error.log
                CustomLog ${APACHE_LOG_DIR}/access.log combined
                SSLEngine on
                SSLCertificateFile      server.crt
                SSLCertificateKeyFile server.key
        

        DocumentRoot /var/www/html

        <Directory /var/www/html>
            Options FollowSymLinks
            AllowOverride All
            Require all granted
            
            RewriteEngine On
            RewriteBase /

            # Redirect /blog on the blog subdomain to the site root.
            RewriteRule ^blog/?$ / [R=301,L]

            # Ensure directory URLs end with a trailing slash so index.html resolves.
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteCond %{REQUEST_URI} !/$
            RewriteRule ^(.+)$ $1/ [R=301,L]

            # Serve real files/directories directly.
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]

            # Resolve extensionless Next export routes to .html.
            RewriteCond %{REQUEST_FILENAME}.html -f
            RewriteRule ^(.+?)/?$ $1.html [L]

            # If request looks like a static asset but does not exist, return 404.
            RewriteCond %{REQUEST_URI} \.[A-Za-z0-9]{1,8}$ [NC]
            RewriteRule ^ - [R=404,L]

            # Unknown routes should be 404 (avoid soft-404 homepage fallbacks).
            RewriteRule ^ - [R=404,L]
        </Directory>

    </VirtualHost>
</IfModule>
